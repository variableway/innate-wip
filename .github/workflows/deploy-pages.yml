name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Load issues data
        run: |
          # Ensure data files exist
          mkdir -p apps/web/data
          if [ ! -f apps/web/data/issues.json ]; then
            echo '{"projects": [], "issues": [], "lastUpdated": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > apps/web/data/issues.json
          fi
          if [ ! -f apps/web/data/weekly.json ]; then
            echo '{"summaries": [], "lastUpdated": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > apps/web/data/weekly.json
          fi

      - name: Build static site
        env:
          GITHUB_PAGES: 'true'
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cd apps/web
          pnpm build:static

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
