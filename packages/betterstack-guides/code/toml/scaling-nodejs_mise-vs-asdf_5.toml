[label .mise.toml]
[tools]
node = "20.10.0"
ruby = "3.2.2"
python = "3.11.0"

[env]
DATABASE_URL = "postgresql://localhost/myapp"
API_KEY = { file = ".env.local", key = "API_KEY" }

[tasks.test]
run = "npm test"

[tasks.dev]
run = "npm run dev"
depends = ["install"]