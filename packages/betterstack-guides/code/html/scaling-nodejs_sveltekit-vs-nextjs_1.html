<script>
  export let data; // Data comes from load function
  
  let filter = '';
  $: filteredUsers = data.users.filter(user => 
    user.name.includes(filter)
  );
</script>

<input bind:value={filter} placeholder="Search users..." />
{#each filteredUsers as user}
  <div>{user.name}</div>
{/each}
