[label docker-compose.yml]
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_TIMEOUT=60
    command: --interval 86400 demo-ubuntu demo-nginx