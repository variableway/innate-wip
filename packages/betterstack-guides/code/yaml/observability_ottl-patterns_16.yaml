# Source: https://betterstack.com/community/guides/observability/ottl-patterns/
# Original language: yaml
# Normalized: yaml
# Block index: 16

transform:
  error_mode: ignore
  trace_statements:
    - context: span
      conditions:
        - kind == SPAN_KIND_SERVER
      statements:
        - set(attributes["http.route.server"], attributes["http.route"])
        - delete_key(attributes, "http.route")