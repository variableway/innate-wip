[label docker-compose.yml]
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - $HOME/.docker/config.json:/config.json
    environment:
      - DOCKER_CONFIG=/
    command: --interval 86400 demo-ubuntu demo-nginx