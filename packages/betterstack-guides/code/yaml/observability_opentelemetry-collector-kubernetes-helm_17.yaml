# Source: https://betterstack.com/community/guides/observability/opentelemetry-collector-kubernetes-helm/
# Original language: yaml
# Normalized: yaml
# Block index: 17

config:
  receivers:
    prometheus:
      config:
        scrape_configs:
          - job_name: 'otel-collector'
            scrape_interval: 10s
            static_configs:
              - targets: ['${MY_POD_IP}:8888']
  service:
    telemetry:
      metrics:
        address: 0.0.0.0:8888