[label docker-compose.yml]
version: "3"
services:
  ubuntu:
    image: ubuntu
    container_name: demo-ubuntu
    command: sleep infinity

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: demo-ubuntu