[label rolling-update.yaml]
apiVersion: apps/v1
kind: Deployment
metadata:
 name: web-app
spec:
 replicas: 5
 strategy:
   type: RollingUpdate
   rollingUpdate:
     maxSurge: 1
     maxUnavailable: 1
 selector:
   matchLabels:
     app: web
 template:
   metadata:
     labels:
       app: web
   spec:
     containers:
     - name: nginx
       image: nginx:1.21