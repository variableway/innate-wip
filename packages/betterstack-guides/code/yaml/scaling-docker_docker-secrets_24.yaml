# Normalized: yaml
# Block index: 24

[label compose.yaml]
services:
  vault-agent:
    image: vault:latest
    volumes:
      - ./vault-agent-config.hcl:/etc/vault/vault-agent-config.hcl
      - ./vault-agent-templates:/etc/vault/templates
    environment:
      - VAULT_ADDR=https://vault.example.com
      - VAULT_TOKEN=${VAULT_TOKEN}

  application:
    image: myapp:latest
    depends_on:
      - vault-agent
    volumes:
      - ./secrets:/run/secrets