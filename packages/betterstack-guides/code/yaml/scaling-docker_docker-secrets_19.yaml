# Source: https://betterstack.com/community/guides/scaling-docker/docker-secrets/
# Original language: yaml
# Normalized: yaml
# Block index: 19

[label compose.yaml]
services:
  web:
    image: nginx:latest
[highlight]
    secrets:
      - source: site_ssl
        target: ssl_cert
        mode: 0400
      - source: site_key
        target: ssl_key
        mode: 0400
[/highlight]
    ports:
      - "443:443"

  database:
    image: postgres:latest
[highlight]
    secrets:
      - source: db_password
        target: postgres_password
        mode: 0400
[/highlight]
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password

[highlight]
secrets:
  site_ssl:
    file: ./certs/site.crt
  site_key:
    file: ./certs/site.key
  db_password:
    external: true
[/highlight]