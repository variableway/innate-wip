version: '3.8'

services:
 web:
   image: nginx
   networks:
     - public
   ports:
     - "80:80"

 api:
   image: my-api-service
   networks:
     - public
     - private

 db:
   image: postgres:14
   networks:
     - private
   environment:
     POSTGRES_PASSWORD: example

networks:
 public:
   driver: bridge
 private:
   driver: bridge
   internal: true