# Original language: yaml
# Normalized: yaml
# Block index: 16

[label minikube-tutorial.yaml]
apiVersion: apps/v1
kind: Deployment
metadata:
 name: hello-minikube
spec:
 selector:
   matchLabels:
     app: hello-minikube
 replicas: 2
 template:
   metadata:
     labels:
       app: hello-minikube
   spec:
     containers:
     - name: hello-minikube
       image: k8s.gcr.io/echoserver:1.4
       ports:
       - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
 name: hello-minikube
spec:
 type: NodePort
 ports:
 - port: 8080
   nodePort: 30000
 selector:
   app: hello-minikube