# Source: https://betterstack.com/community/guides/monitoring/sre-golden-signals/
# Original language: yaml
# Normalized: yaml
# Block index: 9

- alert: HighErrorRate
  expr: sum(rate(http_request_errors_total[5m])) / sum(rate(http_requests_total[5m])) > 0.05
  for: 5m
  labels:
    severity: critical
  annotations:
    summary: "High error rate detected"
    description: "Error rate is above 5% for 5 minutes"