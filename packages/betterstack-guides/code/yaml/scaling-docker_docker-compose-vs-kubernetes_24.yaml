[label readiness-probe.yaml]
apiVersion: apps/v1
kind: Deployment
metadata:
 name: web-app
spec:
 replicas: 3
 selector:
   matchLabels:
     app: web
 template:
   metadata:
     labels:
       app: web
   spec:
     containers:
     - name: nginx
       image: nginx:latest
       readinessProbe:
         httpGet:
           path: /healthz
           port: 80
         initialDelaySeconds: 5
         periodSeconds: 5