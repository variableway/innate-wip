# Source: https://betterstack.com/community/guides/observability/opentelemetry-best-practices/
# Original language: yaml
# Normalized: yaml
# Block index: 6

processors:
  metricsgenerator:
    rules:
      - name: span.count
        type: sum
        inputs:
          - name: span
            type: counter
        dimensions:
          - name: service.name
          - name: span.kind
          - name: status.code