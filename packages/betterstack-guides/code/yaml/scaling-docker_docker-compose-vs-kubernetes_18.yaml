[label web-deployment.yaml]
apiVersion: apps/v1
kind: Deployment
metadata:
 name: web
spec:
 replicas: 1
 selector:
   matchLabels:
     app: web
 template:
   metadata:
     labels:
       app: web
   spec:
     containers:
     - name: nginx
       image: nginx:latest
       ports:
       - containerPort: 80