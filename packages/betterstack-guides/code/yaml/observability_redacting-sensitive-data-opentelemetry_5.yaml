# Source: https://betterstack.com/community/guides/observability/redacting-sensitive-data-opentelemetry/
# Original language: yaml
# Normalized: yaml
# Block index: 5

processors:
  transform/redact:
    trace_statements:
      - context: span
        statements:
          - replace_pattern(attributes["http.url"], "client_id=[^&]+", "client_id=[REDACTED]")
          - replace_pattern(attributes["http.url"], "client_secret=[^&]+", "client_secret=[REDACTED]")