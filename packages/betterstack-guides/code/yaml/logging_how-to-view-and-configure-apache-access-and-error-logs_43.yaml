services:
  vector:
    image: timberio/vector:0.40.0-alpine
    container_name: apache-vector
    volumes:
      - ./vector.yaml:/etc/vector/vector.yaml:ro
      - /var/log/apache2:/var/log/apache2:ro
    restart: unless-stopped