[label deployment.yaml]
apiVersion: apps/v1
kind: Deployment
metadata:
 name: web-app
 labels:
   app: web
spec:
 replicas: 3
 selector:
   matchLabels:
     app: web
 template:
   metadata:
     labels:
       app: web
   spec:
     containers:
     - name: nginx
       image: nginx:latest
       ports:
       - containerPort: 80
       resources:
         limits:
           memory: "128Mi"
           cpu: "500m"