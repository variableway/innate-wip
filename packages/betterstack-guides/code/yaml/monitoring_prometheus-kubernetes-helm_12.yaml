# Source: https://betterstack.com/community/guides/monitoring/prometheus-kubernetes-helm/
# Original language: yaml
# Normalized: yaml
# Block index: 12

[label prometheus-values.yaml]
serverFiles:
  prometheus.yml:
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
            - localhost:9090
      - job_name: docker-daemon
        static_configs:
          - targets:
            - host.docker.internal:9323