# Original language: yaml
# Normalized: yaml
# Block index: 32

[label hello-app.yaml]
apiVersion: apps/v1
kind: Deployment
metadata:
 name: hello-app
spec:
 replicas: 3
 selector:
   matchLabels:
     app: hello
 template:
   metadata:
     labels:
       app: hello
   spec:
     containers:
     - name: hello
       image: gcr.io/google-samples/hello-app:1.0
       ports:
       - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
 name: hello-service
spec:
 selector:
   app: hello
 ports:
 - port: 80
   targetPort: 8080