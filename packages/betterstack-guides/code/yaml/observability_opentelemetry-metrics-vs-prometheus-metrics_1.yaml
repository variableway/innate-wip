[label otelcol.yaml]
receivers:
[highlight]
  prometheus:
    config:
      scrape_configs:
        - job_name: demo-app
          scrape_interval: 10s
          static_configs:
            - targets: ['localhost:8000']
[/highlight]

processors:
  batch:

exporters:
[highlight]
  debug:
    verbosity: detailed
[/highlight]

service:
  pipelines:
    metrics:
      receivers: [prometheus]
      processors: [batch]
      exporters: [debug]